    <style>
      #tg-ad-layer {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: flex-start;

      }
      #tg-reward-btn {
        pointer-events: auto;
        font-size: 15px;
        padding: 10px 18px;

<body>
    <div id="GameDiv" cc_exact_fit_screen="true">
        <div id="Cocos3dGameContainer">
            <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
        </div>
    </div>
    <div id="cover">
        <div id="logo">
            <img src="favicon.png" alt="Logo" />
            <div id="loader-container">
                <span id="loader"></span>
            </div>
        </div>
    </div>
    <!-- LOADER -->
    <script>
        window.loadTimer;
        (function () {
            function lerp(value1, value2, amount) {
                return value1 + (value2 - value1) * amount;
            }
            const loadBar = document.getElementById("loader");
            let percent = 0.1,
                target = 76;
            window.loadTimer = setInterval(() => {
                if (percent > 75) {
                    clearInterval(window.loadTimer);
                    console.log("clear timer");
                    percent = 76;
                } else percent = lerp(percent, target, 0.011);
                loadBar.style.width = percent + "%";
            }, 16.7);
        })();
    </script>
    <!-- Polyfills bundle. -->
    <script src="src/polyfills.bundle.js" charset="utf-8"> </script>

    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <!-- Adsgram Ad Layer -->
    <div id="tg-ad-layer">
        <div id="tg-score-toast">+200 pts</div>
        <button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200 pts</button>
    </div>

    <script>
    (function () {
        // Telegram WebApp init
        window.Telegram && window.Telegram.WebApp && (
            window.Telegram.WebApp.ready(),
            window.Telegram.WebApp.expand()
        );

        var AdController    = null;
        var IntAdController = null;

        // Read ad Block IDs from ID.txt, format: KEY=VALUE, one per line
        function loadConfig(cb) {
            fetch('ID.txt?_=' + Date.now())
                .then(function (r) { return r.text(); })
                .then(function (text) {
                    var cfg = {};
                    text.split('\n').forEach(function (line) {
                        var parts = line.trim().split('=');
                        if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
                    });
                    cb(cfg);
                })
                .catch(function () { cb({}); });
        }

        function initAds(cfg) {
            if (!window.Adsgram) return;
            var rewardId = cfg['REWARD_BLOCK_ID'] || '';
            var intId    = cfg['INT_BLOCK_ID']    || '';
            try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch(e) {}
            try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch(e) {}

            document.getElementById('tg-reward-btn').style.display = 'block';
            startIntAdTimer();
        }

        function waitAndInit(cfg) {
            if (window.Adsgram) {
                initAds(cfg);
            } else {
                var sdkCheck = setInterval(function () {
                    if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
                }, 300);
            }
        }

        // Load config first, then initialize ads
        loadConfig(function (cfg) { waitAndInit(cfg); });

        // Rewarded ad: +200 pts after watching
        window.tgShowRewardAd = function () {
            if (!AdController) return;
            var btn = document.getElementById('tg-reward-btn');
            btn.disabled = true;
            AdController.show().then(function () {
                // Notify game to add score (Cocos script can override this function)
                if (typeof window.onAdsgramReward === 'function') {
                    window.onAdsgramReward(200);
                }
                // Floating toast notification
                var toast = document.getElementById('tg-score-toast');
                toast.style.display = 'block';
                toast.style.animation = 'none';
                setTimeout(function () {
                    toast.style.animation = 'floatUp 1.2s ease forwards';
                    setTimeout(function () { toast.style.display = 'none'; }, 1200);
                }, 20);
                // 60-second cooldown
                var cd = 60;
                btn.textContent = '⏳ ' + cd + 's';
                var cdTimer = setInterval(function () {
                    cd--;
                    if (cd <= 0) {
                        clearInterval(cdTimer);
                        btn.disabled = false;
                        btn.textContent = '📺 Watch Ad +200 pts';
                    } else {
                        btn.textContent = '⏳ ' + cd + 's';
                    }
                }, 1000);
            }).catch(function () {
                btn.disabled = false;
            });
        };

        // Interstitial ad: auto-show every 30 seconds
        var intAdInterval = null;
        function startIntAdTimer() {
            intAdInterval = setInterval(function () {
                if (!IntAdController) return;
                IntAdController.show().then(function () {}).catch(function () {});
            }, 30000);
        }
    })();
    </script>
